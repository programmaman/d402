name: Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - run: npm ci
      - run: npm run build --if-present

      - name: Verify release version
        id: release
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"

          if [ "$VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Tag version ($VERSION) does not match package.json version ($PACKAGE_VERSION)."
            exit 1
          fi

          awk -v version="$VERSION" '
            $0 ~ "^## " version "( |$)" { found=1; print; next }
            found && /^## / { exit }
            found { print }
          ' CHANGELOG.md > release-notes.md

          if ! grep -q "^## ${VERSION}\( \|$\)" CHANGELOG.md; then
            echo "No CHANGELOG.md entry found for version $VERSION."
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --verify-tag --title "d402 $GITHUB_REF_NAME" --notes-file release-notes.md

      - run: npm publish --provenance --access public
